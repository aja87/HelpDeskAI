services:
  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  langfuse:
    image: langfuse/langfuse:2
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/langfuse
      NEXTAUTH_SECRET: change-me
      SALT: change-me
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
    depends_on:
      - postgres

  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["observability"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: python:3.11-slim
    profiles: ["app"]
    working_dir: /app
    command: python -c "print('HelpDeskAI API is not implemented yet')"
    volumes:
      - .:/app
    depends_on:
      - qdrant
      - mlflow

  crm-mcp:
    image: python:3.13-slim
    profiles: ["mcp"]
    working_dir: /app
    command:
      - sh
      - -c
      - |
        mkdir -p logs
        if [ ! -e /usr/bin/python3.13 ] && [ -x /usr/local/bin/python3.13 ]; then
          ln -s /usr/local/bin/python3.13 /usr/bin/python3.13
        fi
        if [ ! -x /app/.venv/bin/python ]; then
          echo 'ERROR: /app/.venv/bin/python is not executable inside container' | tee -a logs/mcp.log
          ls -la /app/.venv/bin 2>&1 | tee -a logs/mcp.log
          exit 1
        fi
        /app/.venv/bin/python -V 2>&1 | tee -a logs/mcp.log
        /app/.venv/bin/python scripts/run_mcp.py serve-crm 2>&1 | tee -a logs/mcp.log
    environment:
      HELPDESKAI_MCP_TOKEN: ${HELPDESKAI_MCP_TOKEN:-dev-token-unsafe}
      PYTHONPATH: /app
      PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - .:/app

  knowledge-mcp:
    image: python:3.13-slim
    profiles: ["mcp"]
    working_dir: /app
    command:
      - sh
      - -c
      - |
        mkdir -p logs
        if [ ! -e /usr/bin/python3.13 ] && [ -x /usr/local/bin/python3.13 ]; then
          ln -s /usr/local/bin/python3.13 /usr/bin/python3.13
        fi
        if [ ! -x /app/.venv/bin/python ]; then
          echo 'ERROR: /app/.venv/bin/python is not executable inside container' | tee -a logs/mcp.log
          ls -la /app/.venv/bin 2>&1 | tee -a logs/mcp.log
          exit 1
        fi
        /app/.venv/bin/python -V 2>&1 | tee -a logs/mcp.log
        /app/.venv/bin/python scripts/run_mcp.py serve-knowledge 2>&1 | tee -a logs/mcp.log
    environment:
      HELPDESKAI_MCP_TOKEN: ${HELPDESKAI_MCP_TOKEN:-dev-token-unsafe}
      PYTHONPATH: /app
      PATH: /app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - .:/app
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  mlflow_data:
  postgres_data:

