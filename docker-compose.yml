services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  langfuse:
    image: langfuse/langfuse:2
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/langfuse
      NEXTAUTH_SECRET: change-me
      SALT: change-me
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
    depends_on:
      - postgres

  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["observability"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgvector:
    image: pgvector/pgvector:pg16
    profiles: ["retrieval"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helpdeskai
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  api:
    image: python:3.11-slim
    profiles: ["app"]
    working_dir: /app
    command: python -c "print('HelpDeskAI API is not implemented yet')"
    volumes:
      - .:/app
    depends_on:
      - qdrant
      - mlflow

  mcp-crm:
    image: python:3.11-slim
    profiles: ["mcp"]
    working_dir: /app
    command: python -m helpdeskai.mcp_servers.crm --transport sse
    environment:
      HELPDESKAI_MCP_TOKEN: ${HELPDESKAI_MCP_TOKEN:-helpdeskai-dev-token}
      HELPDESKAI_MCP_AUDIT_PATH: /app/data/audit/mcp-crm.jsonl
    volumes:
      - .:/app

  mcp-knowledge:
    image: python:3.11-slim
    profiles: ["mcp"]
    working_dir: /app
    command: python -m helpdeskai.mcp_servers.knowledge --transport sse
    environment:
      HELPDESKAI_MCP_TOKEN: ${HELPDESKAI_MCP_TOKEN:-helpdeskai-dev-token}
      HELPDESKAI_MCP_AUDIT_PATH: /app/data/audit/mcp-knowledge.jsonl
    volumes:
      - .:/app

volumes:
  qdrant_data:
  mlflow_data:
  postgres_data:
  pgvector_data:
