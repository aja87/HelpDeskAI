services:
  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  langfuse-web:
    image: langfuse/langfuse:3
    profiles: ["observability"]
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment: &langfuse-env
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      SALT: formation-neosoft-salt
      ENCRYPTION_KEY: f5edb7a7a19a001d7df8f441acf0a209ce94dba4341601572fdf49304fcae2d7
      NEXTAUTH_SECRET: formation-neosoft-secret
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: myredissecret
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    profiles: ["observability"]
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment: *langfuse-env

  postgres:
    image: postgres:16
    profiles: ["observability"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - langfuse_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    profiles: ["observability"]
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7
    profiles: ["observability"]
    command: --requirepass myredissecret
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "myredissecret", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15

  minio:
    image: minio/minio
    profiles: ["observability"]
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server /data --address ":9000" --console-address ":9001"'
    ports:
      - "9090:9000"
      - "9091:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - langfuse_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 15

  pgvector:
    image: pgvector/pgvector:pg16
    profiles: ["retrieval"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helpdeskai
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  api:
    image: python:3.11-slim
    profiles: ["app"]
    working_dir: /app
    command: python -c "print('HelpDeskAI API is not implemented yet')"
    volumes:
      - .:/app
    depends_on:
      - qdrant
      - mlflow

  mcp-crm:
    image: python:3.11-slim
    profiles: ["mcp"]
    working_dir: /app
    command: python -m helpdeskai.mcp_servers.crm --transport sse
    environment:
      HELPDESKAI_MCP_TOKEN: ${HELPDESKAI_MCP_TOKEN:-helpdeskai-dev-token}
      HELPDESKAI_MCP_AUDIT_PATH: /app/data/audit/mcp-crm.jsonl
    volumes:
      - .:/app

  mcp-knowledge:
    image: python:3.11-slim
    profiles: ["mcp"]
    working_dir: /app
    command: python -m helpdeskai.mcp_servers.knowledge --transport sse
    environment:
      HELPDESKAI_MCP_TOKEN: ${HELPDESKAI_MCP_TOKEN:-helpdeskai-dev-token}
      HELPDESKAI_MCP_AUDIT_PATH: /app/data/audit/mcp-knowledge.jsonl
    volumes:
      - .:/app

volumes:
  qdrant_data:
  mlflow_data:
  pgvector_data:
  langfuse_pg:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio:
